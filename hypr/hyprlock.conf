# ============================================================
# Hyprlock Configuration
# User: smks
# ============================================================

# BACKGROUND
background {
    monitor =
    path = $HOME/.config/hypr/wallpaper/current
    blur_passes = 3
    brightness = 0.4
    contrast = 1.0
    vibrancy = 0.2
}

# GENERAL
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

animations {
    enabled = true
    bezier = smooth, 0.4, 0, 0.2, 1
    animation = fadeIn, 1, 6, smooth
    animation = fadeOut, 1, 4, smooth
    animation = inputFieldDots, 1, 2, smooth
}

# ── AVATAR ──────────────────────────────────────────────────
image {
    monitor =
    path = $HOME/.face
    size = 90
    rounding = -1
    border_size = 2
    border_color = rgba(255, 255, 255, 0.15)
    position = 0, 80
    halign = center
    valign = center
}

# ── USERNAME ─────────────────────────────────────────────────
label {
    monitor =
    text = smks
    color = rgba(255, 255, 255, 0.7)
    font_size = 14
    font_family = Iosevka
    position = 0, -30
    halign = center
    valign = center
}

# ── INPUT FIELD ──────────────────────────────────────────────
input-field {
    monitor =
    size = 220, 42
    outline_thickness = 1
    dots_size = 0.18
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(255, 255, 255, 0.05)
    font_color = rgba(255, 255, 255, 0.8)
    fade_on_empty = true
    rounding = 6
    check_color = rgba(179, 146, 240, 0.9)
    fail_color = rgba(255, 122, 132, 0.9)
    placeholder_text = <span foreground="##ffffff66">󰌾  password</span>
    hide_input = false
    position = 0, -90
    halign = center
    valign = center
}

# ── CLOCK ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +"%-H:%M"
    color = rgba(255, 255, 255, 0.85)
    font_size = 72
    font_family = Iosevka Light
    position = 0, 220
    halign = center
    valign = center
}

# ── MÚSICA ───────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:2000] ~/.config/hypr/scripts/music.sh --status
    color = rgba(179, 146, 240, 0.8)
    font_size = 14
    font_family = Iosevka Nerd Font
    position = -140, 16
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:2000] echo "$(~/.config/hypr/scripts/music.sh --artist) — $(~/.config/hypr/scripts/music.sh --title)"
    color = rgba(255, 255, 255, 0.5)
    font_size = 12
    font_family = Iosevka
    position = 20, 16
    halign = center
    valign = bottom
}

# ── BATERIA ──────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:30000] ~/.config/hypr/scripts/battery.sh
    color = rgba(255, 255, 255, 0.5)
    font_size = 13
    font_family = Iosevka Nerd Font
    position = -20, 20
    halign = right
    valign = bottom
}
